<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ChipRatio, poker chip calculator">
  <defs>
    <radialGradient id="bg" cx="78%" cy="12%" r="90%">
      <stop offset="0%" stop-color="#0d3a27" />
      <stop offset="100%" stop-color="#0a3020" />
    </radialGradient>
    <clipPath id="disc"><circle cx="0" cy="0" r="96" /></clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="20" y="20" width="1160" height="590" rx="28" fill="none" stroke="#1c6942" stroke-width="2" />

  <!-- a fanned row of chips -->
  <g transform="translate(770 470)">
    <g transform="translate(0 0)">
      <circle r="96" fill="#e11d48" />
      <g clip-path="url(#disc)"><g fill="#ffffff" opacity="0.85">
        <rect x="-9" y="-100" width="18" height="26" /><rect x="-9" y="74" width="18" height="26" />
        <rect x="-100" y="-9" width="26" height="18" /><rect x="74" y="-9" width="26" height="18" />
      </g></g>
      <circle r="96" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9" />
      <circle r="58" fill="#0a3020" stroke="#ffffff" stroke-width="4" opacity="0.9" />
      <text y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">5</text>
    </g>
    <g transform="translate(-150 30)">
      <circle r="96" fill="#27272a" />
      <circle r="96" fill="none" stroke="#e8b84b" stroke-width="6" />
      <circle r="58" fill="#0a3020" stroke="#e8b84b" stroke-width="4" />
      <text y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#e8b84b">100</text>
    </g>
    <g transform="translate(-290 66)">
      <circle r="96" fill="#16a34a" />
      <circle r="96" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9" />
      <circle r="58" fill="#0a3020" stroke="#ffffff" stroke-width="4" opacity="0.9" />
      <text y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#ffffff">25</text>
    </g>
  </g>

  <text x="72" y="150" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#e8b84b" letter-spacing="1">CHIPRATIO</text>
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="82" font-weight="800" fill="#f3efe2">Perfect chip</text>
  <text x="70" y="358" font-family="Arial, sans-serif" font-size="82" font-weight="800" fill="#f3efe2">splits, instantly.</text>
  <text x="72" y="430" font-family="Arial, sans-serif" font-size="30" fill="#a9c6b3">Enter your set. Get equal stacks and a blind structure.</text>
  <text x="72" y="472" font-family="Arial, sans-serif" font-size="30" fill="#a9c6b3">Free forever. No ads. No signup.</text>
</svg>
